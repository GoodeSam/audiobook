<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB to Audiobook</title>
  <link rel="stylesheet" href="/src/app.css">
</head>
<body>
  <!-- Upload Screen -->
  <div id="upload-screen" class="screen active">
    <div class="upload-container">
      <h1>EPUB to Audiobook</h1>
      <p class="subtitle">Upload an EPUB book to extract chapters as Markdown, translate, and convert to MP3</p>
      <div id="drop-zone" class="drop-zone">
        <div class="drop-icon">📖</div>
        <p>Drag & drop an EPUB file here</p>
        <p class="or">or</p>
        <label class="file-btn">
          Choose File
          <input type="file" id="file-input" accept=".epub" hidden>
        </label>
      </div>
    </div>
  </div>

  <!-- Reader Screen -->
  <div id="reader-screen" class="screen">
    <header class="toolbar">
      <button id="btn-back" class="tool-btn" title="Back to upload">← Back</button>
      <h2 id="book-title" class="book-title">Book Title</h2>
    </header>

    <!-- Settings Bar -->
    <div class="settings-bar">
      <!-- Voice Settings -->
      <div class="setting-group">
        <label class="setting-label">English Voice</label>
        <div class="voice-row">
          <select id="voice-en-select">
            <optgroup label="US English">
              <option value="en-US-AriaNeural">Aria (Female)</option>
              <option value="en-US-GuyNeural">Guy (Male)</option>
              <option value="en-US-JennyNeural">Jenny (Female)</option>
              <option value="en-US-ChristopherNeural">Christopher (Male)</option>
              <option value="en-US-AnaNeural">Ana (Female)</option>
              <option value="en-US-BrandonNeural">Brandon (Male)</option>
            </optgroup>
            <optgroup label="UK English">
              <option value="en-GB-SoniaNeural">Sonia (Female)</option>
              <option value="en-GB-RyanNeural">Ryan (Male)</option>
            </optgroup>
            <optgroup label="Australian English">
              <option value="en-AU-NatashaNeural">Natasha (Female)</option>
              <option value="en-AU-WilliamNeural">William (Male)</option>
            </optgroup>
          </select>
          <button id="btn-preview-en" class="preview-btn" title="Preview this voice">&#9654;</button>
        </div>
        <label class="speed-control">
          Speed: <input type="range" id="speed-en-range" min="-50" max="100" value="0" step="10">
          <span id="speed-en-label">0%</span>
        </label>
      </div>

      <div class="setting-group">
        <label class="setting-label">Chinese Voice</label>
        <div class="voice-row">
          <select id="voice-zh-select">
            <optgroup label="Mandarin (Mainland)">
              <option value="zh-CN-XiaoxiaoNeural">Xiaoxiao (Female)</option>
              <option value="zh-CN-YunxiNeural">Yunxi (Male)</option>
              <option value="zh-CN-XiaoyiNeural">Xiaoyi (Female)</option>
              <option value="zh-CN-YunjianNeural">Yunjian (Male)</option>
              <option value="zh-CN-XiaochenNeural">Xiaochen (Female)</option>
              <option value="zh-CN-YunyangNeural" selected>Yunyang (Male)</option>
            </optgroup>
            <optgroup label="Mandarin (Taiwan)">
              <option value="zh-TW-HsiaoChenNeural">HsiaoChen (Female)</option>
              <option value="zh-TW-YunJheNeural">YunJhe (Male)</option>
            </optgroup>
          </select>
          <button id="btn-preview-zh" class="preview-btn" title="Preview this voice">&#9654;</button>
        </div>
        <label class="speed-control">
          Speed: <input type="range" id="speed-zh-range" min="-50" max="100" value="0" step="10">
          <span id="speed-zh-label">0%</span>
        </label>
      </div>

      <div class="setting-group">
        <label class="setting-label">Audio Mode</label>
        <select id="audio-mode-select">
          <option value="original">Original</option>
          <option value="translated">Translated</option>
          <option value="bilingual">Bilingual (Original + Translated)</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">Translate To</label>
        <select id="translate-lang-select">
          <option value="zh-Hans">Chinese (Simplified)</option>
          <option value="zh-Hant">Chinese (Traditional)</option>
          <option value="en">English</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
        </select>
      </div>
    </div>

    <div class="main-content">
      <!-- Chapter List Sidebar -->
      <aside id="chapter-sidebar" class="sidebar">
        <div class="sidebar-header">
          <h3>Chapters</h3>
          <div class="sidebar-actions">
            <button id="btn-select-all" class="small-btn" title="Select/deselect all">Select All</button>
            <button id="btn-translate-selected" class="action-btn" title="Translate selected chapters">Translate</button>
            <button id="btn-generate-selected" class="action-btn" title="Generate MP3 for selected chapters">Generate MP3s</button>
            <button id="btn-export-selected" class="action-btn" title="Export selected as Markdown">Export MD</button>
            <button id="btn-download-all" class="action-btn" title="Download all MP3s as ZIP" disabled>Download ZIP</button>
          </div>
        </div>
        <ul id="chapter-list" class="chapter-list"></ul>
      </aside>

      <!-- Chapter Content -->
      <main id="chapter-content" class="content-area">
        <div id="content-placeholder" class="placeholder">
          <p>Select a chapter from the sidebar to view its content</p>
        </div>
        <div id="chapter-view" class="chapter-view" hidden>
          <div class="chapter-header">
            <h2 id="chapter-title"></h2>
            <div class="chapter-actions">
              <button id="btn-translate-chapter" class="action-btn">Translate</button>
              <button id="btn-generate-chapter" class="action-btn">Generate MP3</button>
              <button id="btn-download-chapter" class="action-btn" disabled>Download MP3</button>
              <button id="btn-download-md" class="action-btn">Download MD</button>
            </div>
          </div>
          <div class="chapter-content-tabs">
            <button class="tab-btn active" data-tab="original">Original</button>
            <button class="tab-btn" data-tab="translated">Translated</button>
          </div>
          <div id="chapter-markdown" class="markdown-content"></div>
        </div>
      </main>
    </div>

    <!-- Progress Overlay -->
    <div id="progress-overlay" class="progress-overlay" hidden>
      <div class="progress-card">
        <h3 id="progress-title">Working...</h3>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
          <span id="progress-percent" class="progress-percent">0%</span>
        </div>
        <p id="progress-text"></p>
        <button id="btn-cancel" class="action-btn cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
